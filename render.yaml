# Render Blueprint（可选）：现有服务只需 push 即可重建，此文件用于文档化配置
# 升级到 Starter 后：plan 改为 starter，并取消 disk 注释以持久化模拟数据
services:
  - type: web
    name: seb
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
    # disk:
    #   name: sebastian-data
    #   mountPath: /app/backend/uploads
    #   sizeGB: 1
