    <circle cx="172" cy="128" r="18"/>
    <circle cx="152" cy="180" r="12"/>
    <circle cx="208" cy="228" r="16"/>
    <circle cx="284" cy="252" r="12"/>
    <circle cx="330" cy="310" r="20"/>
